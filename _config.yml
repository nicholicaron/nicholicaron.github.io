# Site settings
title: Nicholi Caron
email: nicholijcaron@gmail.com
description: >-
  ML engineer building RAG pipelines, multi-agent systems, and production AI infrastructure.
baseurl: ""
url: "https://nicholi.ai"

# Build settings
markdown: kramdown
highlighter: rouge

# Permalink style
permalink: /:year/:month/:day/:title:output_ext

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-relative-links

# Default front matter
defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Nicholi Caron"

# Sass settings
sass:
  style: compressed
